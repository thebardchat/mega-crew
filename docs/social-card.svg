<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060910"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Horizontal scan lines -->
  <g opacity="0.04" stroke="#f97316" stroke-width="1">
    <line x1="0" y1="45" x2="1200" y2="45"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="495" x2="1200" y2="495"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="585" x2="1200" y2="585"/>
  </g>

  <!-- Right side: bot name grid -->
  <g font-family="monospace" font-weight="900">
    <!-- Row 1 -->
    <text x="620" y="115" fill="#f97316" font-size="42" opacity="0.9">ARC</text>
    <text x="750" y="115" fill="#ef4444" font-size="42" opacity="0.9">BLAZE</text>
    <text x="940" y="115" fill="#eab308" font-size="42" opacity="0.9">BOLT</text>
    <text x="1060" y="115" fill="#8b5cf6" font-size="42" opacity="0.7">CRANK</text>
    <!-- Row 2 -->
    <text x="620" y="185" fill="#06b6d4" font-size="42" opacity="0.9">FLUX</text>
    <text x="740" y="185" fill="#f97316" font-size="42" opacity="0.9">FORGE</text>
    <text x="930" y="185" fill="#10b981" font-size="42" opacity="0.9">GLITCH</text>
    <text x="1080" y="185" fill="#6b7280" font-size="42" opacity="0.7">GRIND</text>
    <!-- Row 3 -->
    <text x="620" y="255" fill="#a78bfa" font-size="42" opacity="0.9">NEON</text>
    <text x="760" y="255" fill="#64748b" font-size="42" opacity="0.9">RIVET</text>
    <text x="920" y="255" fill="#f59e0b" font-size="42" opacity="0.9">SPARKY</text>
    <text x="1090" y="255" fill="#dc2626" font-size="42" opacity="0.7">TORCH</text>
    <!-- Row 4 -->
    <text x="620" y="325" fill="#3b82f6" font-size="42" opacity="0.9">VOLT</text>
    <text x="750" y="325" fill="#78716c" font-size="42" opacity="0.9">WELD</text>
    <text x="920" y="325" fill="#f97316" font-size="42" opacity="0.5">SPIKE</text>
    <text x="1060" y="325" fill="#8b5cf6" font-size="42" opacity="0.5">STOMP</text>
  </g>

  <!-- Divider line -->
  <line x1="600" y1="80" x2="600" y2="540" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Left side text -->
  <!-- Badge -->
  <rect x="60" y="80" width="160" height="28" rx="14" fill="none" stroke="#f97316" stroke-width="1" opacity="0.6"/>
  <text x="140" y="99" text-anchor="middle" fill="#f97316" font-size="11" font-family="monospace" letter-spacing="2">24/7 LIVE CREW</text>

  <!-- Title -->
  <text x="60" y="200" fill="#f97316" font-size="90" font-weight="900" font-family="monospace" letter-spacing="4">MEGA</text>
  <text x="60" y="290" fill="#00d4ff" font-size="90" font-weight="900" font-family="monospace" letter-spacing="4">CREW</text>

  <!-- Divider -->
  <line x1="60" y1="320" x2="450" y2="320" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Description -->
  <text x="60" y="360" fill="#7d8fa8" font-size="18" font-family="monospace">14 named AI bots · Raspberry Pi 5</text>
  <text x="60" y="390" fill="#7d8fa8" font-size="18" font-family="monospace">Personality · Memory · Local Ollama</text>

  <!-- Bus indicator -->
  <rect x="60" y="425" width="440" height="50" rx="4" fill="#0b1526" stroke="#1a2a4a" stroke-width="1"/>
  <text x="80" y="447" fill="#3d5070" font-size="12" font-family="monospace">MESSAGE BUS</text>
  <text x="80" y="464" fill="#f97316" font-size="11" font-family="monospace">bus.db · SQLite · crew_supervisor.py</text>
  <circle cx="480" cy="450" r="6" fill="#10b981" opacity="0.9"/>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#060910" opacity="0.8"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#1a2a4a" stroke-width="1"/>
  <text x="60" y="603" fill="#3d5070" font-size="13" font-family="monospace">github.com/thebardchat/mega-crew</text>
  <text x="1140" y="603" text-anchor="end" fill="#f97316" font-size="13" font-family="monospace">Built by Shane + Claude Anthropic</text>
</svg>
